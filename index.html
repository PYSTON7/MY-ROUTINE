<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Routine Planner</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="container">
    <h1>My Routine Planner</h1>

    <form id="routine-form">
      <div class="form-group">
        <label>Activity</label>
        <input type="text" id="activity" required>
      </div>

      <div class="form-group">
        <label>Time of Day</label>
        <select id="time-of-day">
          <option value="morning">Morning</option>
          <option value="afternoon">Afternoon</option>
          <option value="evening">Evening</option>
        </select>
      </div>

      <button type="submit">Add</button>
    </form>

    <div class="routine-sections">

      <div class="routine-box">
        <h2>Morning</h2>
        <ul id="morning-list"></ul>
      </div>

      <div class="routine-box">
        <h2>Afternoon</h2>
        <ul id="afternoon-list"></ul>
      </div>

      <div class="routine-box">
        <h2>Evening</h2>
        <ul id="evening-list"></ul>
      </div>

    </div>

    <div class="completed-section">
      <h2>Completed</h2>
      <ul id="completed-list"></ul>
    </div>
  </div>

  <script src="js/routine.js"></script>
  <script src="js/routine-manager.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
