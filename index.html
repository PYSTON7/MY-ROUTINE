<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Routine Planner,Address Book & Visited Places</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="container">
    <h1>ROUTINE PLANNER</h1>
    <!-- ROUTINE FORM -->
    <form id="routine-form">

      <div class="form-group">
        <label>Activity</label>
        <input type="text" id="activity" required>
      </div>

      <div class="form-group">
        <label>Time of Day</label>
        <select id="time-of-day">
          <option value="morning">Morning</option>
          <option value="afternoon">Afternoon</option>
          <option value="evening">Evening</option>
        </select>
      </div>

      <button type="submit">Add Activity</button>

    </form>

    <!-- ROUTINE SECTIONS -->
    <div class="routine-sections">

      <div class="routine-box">
        <h2>Morning</h2>
        <ul id="morning-list"></ul>
      </div>

      <div class="routine-box">
        <h2>Afternoon</h2>
        <ul id="afternoon-list"></ul>
      </div>

      <div class="routine-box">
        <h2>Evening</h2>
        <ul id="evening-list"></ul>
      </div>

    </div>

    <!-- COMPLETED ROUTINES -->
    <div class="completed-section">
      <h2>Completed Activities</h2>
      <ul id="completed-list"></ul>
    </div>


   <!-- ADDRESS BOOK SECTION -->
<div class="address-book-section">

  <h1>ADDRESS BOOK</h1>

  <form id="contact-form">

    <div class="form-group">
      <label>First Name</label>
      <input type="text" id="first-name" required>
    </div>

    <div class="form-group">
      <label>Last Name</label>
      <input type="text" id="last-name" required>
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="text" id="phone" required>
    </div>

    <div class="form-group">
      <label>Address</label>
      <input type="text" id="address" required>
    </div>

    <button type="submit">Add Contact</button>

  </form>

  <!-- CONTACT LIST -->
  <div class="contact-box">
    <h2>Contacts</h2>
    <ul id="contact-list"></ul>
  </div>

  <!-- CONTACT DETAILS -->
  <div class="contact-details-box">
    <!-- <h2>Contact Details</h2> -->
    <div id="contact-details">
      <p>Click the name to show Contact Details</p>
    </div>
  </div>

</div>
    
    <!-- PLACES YOU'VE BEEN -->
<div class="places-container">
  <h1>PLACES YOU'VE BEEN</h1>

  <!-- Add New Place Form -->
  <form id="place-form">
    <div class="form-group">
      <label for="place-name">Place Name</label>
      <input type="text" id="place-name" required>
    </div>

    <div class="form-group">
      <label for="place-location">Location</label>
      <input type="text" id="place-location" required>
    </div>

    <div class="form-group">
      <label for="place-landmarks">Landmarks</label>
      <input type="text" id="place-landmarks" placeholder="Separate with commas">
    </div>

    <div class="form-group">
      <label for="place-time">Time of Year</label>
      <input type="text" id="place-time" placeholder="e.g., Summer 2023">
    </div>

    <div class="form-group">
      <label for="place-notes">Notes</label>
      <textarea id="place-notes" rows="3" placeholder="Your experience"></textarea>
    </div>

    <button type="submit">Add Place</button>
  </form>

  <!-- List of Places -->
  <div class="places-list-container">
    <h2>Visited Places</h2>
    <ul id="place-list"></ul>
  </div>

  <!-- Place Details -->
  <div class="place-details-container">
    <h2>Place Details</h2>
    <div id="place-details"></div>
  </div>
</div>

  </div>

  <!-- ROUTINE JS -->
  <script src="js/routine.js"></script>
  <script src="js/routine-manager.js"></script>

  <!-- ADDRESS BOOK JS -->
  <script src="js/contact.js"></script>
  <script src="js/address-book.js"></script>

  <!-- MAIN SCRIPT -->
  <script src="js/script.js"></script>

</body>
</html>
