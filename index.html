<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Routine Planner & Address Book</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="container">

    <h1>My Routine Planner</h1>

    <!-- ROUTINE FORM -->
    <form id="routine-form">

      <div class="form-group">
        <label>Activity</label>
        <input type="text" id="activity" required>
      </div>

      <div class="form-group">
        <label>Time of Day</label>
        <select id="time-of-day">
          <option value="morning">Morning</option>
          <option value="afternoon">Afternoon</option>
          <option value="evening">Evening</option>
        </select>
      </div>

      <button type="submit">Add Activity</button>

    </form>

    <!-- ROUTINE SECTIONS -->
    <div class="routine-sections">

      <div class="routine-box">
        <h2>Morning</h2>
        <ul id="morning-list"></ul>
      </div>

      <div class="routine-box">
        <h2>Afternoon</h2>
        <ul id="afternoon-list"></ul>
      </div>

      <div class="routine-box">
        <h2>Evening</h2>
        <ul id="evening-list"></ul>
      </div>

    </div>

    <!-- COMPLETED ROUTINES -->
    <div class="completed-section">
      <h2>Completed Activities</h2>
      <ul id="completed-list"></ul>
    </div>


    <!-- ADDRESS BOOK SECTION -->
    <div class="address-book-section">

      <h1>Address Book</h1>

      <form id="contact-form">

        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="first-name" required>
        </div>

        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="last-name" required>
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" id="phone" required>
        </div>

        <div class="form-group">
          <label>Address</label>
          <input type="text" id="address" required>
        </div>

        <button type="submit">Add Contact</button>

      </form>

      <!-- CONTACT LIST -->
      <div class="contact-box">
        <h2>Contacts</h2>
       <ul id="contact-list"></ul>
    </div>


  </div>

  <!-- ROUTINE JS -->
  <script src="js/routine.js"></script>
  <script src="js/routine-manager.js"></script>

  <!-- ADDRESS BOOK JS -->
  <script src="js/contact.js"></script>
  <script src="js/address-book.js"></script>

  <!-- MAIN SCRIPT -->
  <script src="js/script.js"></script>

</body>
</html>
